{% extends "base.html" %}

{% block title %}聊天监控{% endblock %}

{% block content %}
<!-- 接管模式横幅 -->
<div class="takeover-banner" id="takeover-banner" style="display: none;">
    <span class="banner-icon">⚠️</span>
    <span class="banner-text">接管模式已开启 - 您的消息将直接发送给设备</span>
</div>

<div class="chat-monitor-header">
    <div class="header-left">
        <h1>聊天监控</h1>
        <p>实时查看对话消息流</p>
    </div>
    <div class="header-right">
        <div class="connection-status">
            <span id="status-dot" class="status-dot disconnected"></span>
            <span id="status-text">未连接</span>
        </div>
        <div class="takeover-toggle">
            <span class="toggle-label">接管模式</span>
            <label class="toggle-switch">
                <input type="checkbox" id="takeover-toggle" onchange="toggleTakeover(this.checked)">
                <span class="toggle-slider"></span>
            </label>
        </div>
    </div>
</div>

<!-- 消息滚动区域 -->
<div class="chat-messages" id="chat-messages">
    <div class="empty-state" id="empty-state">
        <div class="empty-icon">💬</div>
        <p>等待连接...</p>
    </div>
</div>

<!-- 接管模式输入框（US-016 启用，当前隐藏） -->
<div class="takeover-input" id="takeover-input" style="display: none;">
    <input type="text" id="takeover-message" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
    <button class="btn btn-primary" onclick="sendTakeoverMessage()">发送</button>
</div>
{% endblock %}

{% block scripts %}
<script>
// WebSocket 连接
let ws = null;
let reconnectTimer = null;
const RECONNECT_INTERVAL = 3000;
const WS_URL = 'ws://' + window.location.host + '/admin/ws/chat';

// 接管模式状态
let takeoverMode = false;
let sessionId = 'default';  // 当前会话 ID

// 从 URL 参数获取 session_id
function getSessionIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('session_id') || 'default';
}

// 初始化
function init() {
    sessionId = getSessionIdFromUrl();
    connectWebSocket();
}

// 连接 WebSocket
function connectWebSocket() {
    updateStatus('connecting');

    try {
        ws = new WebSocket(WS_URL);

        ws.onopen = () => {
            updateStatus('connected');
            clearReconnectTimer();
        };

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                handleMessage(msg);
            } catch (e) {
                console.error('解析消息失败:', e);
            }
        };

        ws.onclose = () => {
            updateStatus('disconnected');
            scheduleReconnect();
        };

        ws.onerror = (err) => {
            console.error('WebSocket 错误:', err);
            updateStatus('disconnected');
        };
    } catch (e) {
        console.error('创建 WebSocket 失败:', e);
        updateStatus('disconnected');
        scheduleReconnect();
    }
}

// 更新连接状态
function updateStatus(status) {
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    const emptyState = document.getElementById('empty-state');

    dot.className = 'status-dot ' + status;

    switch (status) {
        case 'connected':
            text.textContent = '已连接';
            emptyState.innerHTML = '<div class="empty-icon">💬</div><p>等待消息...</p>';
            break;
        case 'connecting':
            text.textContent = '连接中...';
            emptyState.innerHTML = '<div class="empty-icon">⏳</div><p>正在连接...</p>';
            break;
        case 'disconnected':
            text.textContent = '已断开';
            emptyState.innerHTML = '<div class="empty-icon">❌</div><p>连接已断开，正在重连...</p>';
            break;
    }
}

// 安排重连
function scheduleReconnect() {
    if (reconnectTimer) return;
    reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connectWebSocket();
    }, RECONNECT_INTERVAL);
}

// 清除重连定时器
function clearReconnectTimer() {
    if (reconnectTimer) {
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
    }
}

// 处理消息
function handleMessage(msg) {
    const container = document.getElementById('chat-messages');
    const emptyState = document.getElementById('empty-state');

    // 隐藏空状态
    if (emptyState) {
        emptyState.style.display = 'none';
    }

    // 根据消息类型渲染
    const messageEl = renderMessage(msg);
    if (messageEl) {
        container.appendChild(messageEl);
        // 滚动到底部
        container.scrollTop = container.scrollHeight;
    }
}

// 渲染消息
function renderMessage(msg) {
    const { type, content, is_history } = msg;
    const wrapper = document.createElement('div');
    wrapper.className = 'message-wrapper';

    if (is_history) {
        wrapper.classList.add('history');
    }

    switch (type) {
        case 'user_message':
            wrapper.classList.add('user');
            wrapper.innerHTML = `
                <div class="message-bubble user-bubble">
                    <div class="message-role">用户</div>
                    <div class="message-content">${esc(content)}</div>
                </div>
            `;
            break;

        case 'llm_text':
        case 'llm_reply':
            wrapper.classList.add('assistant');
            wrapper.innerHTML = `
                <div class="message-bubble assistant-bubble">
                    <div class="message-role">助手</div>
                    <div class="message-content">${esc(content)}</div>
                </div>
            `;
            break;

        case 'tool_call':
            wrapper.classList.add('tool-call');
            const toolInfo = renderToolCall(content);
            wrapper.innerHTML = `
                <div class="message-bubble tool-bubble">
                    <div class="message-role">工具调用</div>
                    ${toolInfo}
                </div>
            `;
            break;

        case 'tool_result':
            wrapper.classList.add('tool-result');
            wrapper.innerHTML = `
                <div class="message-bubble tool-result-bubble">
                    <div class="message-role">工具结果</div>
                    <div class="message-content">${renderToolResult(content)}</div>
                </div>
            `;
            break;

        case 'error':
            wrapper.classList.add('error');
            wrapper.innerHTML = `
                <div class="message-bubble error-bubble">
                    <div class="message-role">错误</div>
                    <div class="message-content">${esc(content)}</div>
                </div>
            `;
            break;

        default:
            console.log('未知消息类型:', type, content);
            return null;
    }

    return wrapper;
}

// 渲染工具调用
function renderToolCall(content) {
    if (!content) return '<div class="message-content">无内容</div>';

    // content 可能是数组或单个对象
    const calls = Array.isArray(content) ? content : [content];

    let html = '';
    for (const call of calls) {
        const name = call.function?.name || call.name || '未知工具';
        let args = call.function?.arguments || call.arguments || '{}';

        // 尝试解析参数
        let argsSummary = '';
        try {
            const argsObj = typeof args === 'string' ? JSON.parse(args) : args;
            const keys = Object.keys(argsObj);
            if (keys.length > 0) {
                argsSummary = keys.map(k => `${k}: ${truncate(String(argsObj[k]), 30)}`).join(', ');
            }
        } catch (e) {
            argsSummary = truncate(args, 50);
        }

        html += `
            <div class="tool-call-item">
                <span class="tool-name">${esc(name)}</span>
                ${argsSummary ? `<span class="tool-args">${esc(argsSummary)}</span>` : ''}
            </div>
        `;
    }

    return html;
}

// 渲染工具结果
function renderToolResult(content) {
    if (!content) return '无结果';

    const toolCallId = content.tool_call_id || '';
    const result = content.content || '';

    // 截断长结果
    const truncated = truncate(String(result), 200);
    return `<span class="tool-result-content">${esc(truncated)}</span>`;
}

// 截断字符串
function truncate(str, maxLen) {
    if (!str) return '';
    return str.length > maxLen ? str.substring(0, maxLen) + '...' : str;
}

// 切换接管模式
async function toggleTakeover(enabled) {
    const endpoint = enabled ? 'enable' : 'disable';

    try {
        const response = await fetch(`/admin/api/takeover/${sessionId}/${endpoint}`, {
            method: 'POST'
        });
        const result = await response.json();

        if (result.success) {
            takeoverMode = enabled;
            showTakeoverBanner(enabled);
            showInputBox(enabled);
            showToast(enabled ? '接管模式已开启' : '接管模式已关闭');
        } else {
            // API 返回失败，恢复开关状态
            document.getElementById('takeover-toggle').checked = !enabled;
            showToast('操作失败: ' + (result.error || '未知错误'));
        }
    } catch (e) {
        console.error('接管模式切换失败:', e);
        document.getElementById('takeover-toggle').checked = !enabled;
        showToast('网络错误，请稍后重试');
    }
}

// 显示/隐藏接管模式横幅
function showTakeoverBanner(show) {
    const banner = document.getElementById('takeover-banner');
    banner.style.display = show ? 'flex' : 'none';
}

// 显示/隐藏输入框
function showInputBox(show) {
    const inputArea = document.getElementById('takeover-input');
    inputArea.style.display = show ? 'flex' : 'none';
}

// 处理按键
function handleKeyPress(event) {
    if (event.key === 'Enter') {
        sendTakeoverMessage();
    }
}

// 发送接管消息（US-016 实现）
async function sendTakeoverMessage() {
    const input = document.getElementById('takeover-message');
    const message = input.value.trim();

    if (!message) return;

    try {
        const response = await fetch(`/admin/api/takeover/${sessionId}/respond`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: message})
        });
        const result = await response.json();

        if (result.success) {
            // 在聊天记录中显示为 assistant 消息，标记「接管回复」
            addTakeoverMessage(message);
            input.value = '';
        } else {
            showToast('发送失败: ' + (result.error || '未知错误'));
        }
    } catch (e) {
        console.error('发送接管消息失败:', e);
        showToast('网络错误，请稍后重试');
    }
}

// 添加接管回复消息到聊天记录
function addTakeoverMessage(text) {
    const container = document.getElementById('chat-messages');
    const emptyState = document.getElementById('empty-state');

    // 隐藏空状态
    if (emptyState) {
        emptyState.style.display = 'none';
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'message-wrapper assistant takeover-message';
    wrapper.innerHTML = `
        <div class="message-bubble assistant-bubble">
            <div class="message-role">助手 <span class="takeover-badge">接管回复</span></div>
            <div class="message-content">${esc(text)}</div>
        </div>
    `;

    container.appendChild(wrapper);
    // 滚动到底部
    container.scrollTop = container.scrollHeight;
}

// 初始化
init();
</script>

<style>
/* 接管模式横幅 */
.takeover-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
    color: white;
    border-radius: 8px;
    margin-bottom: 1rem;
    font-weight: 500;
    box-shadow: 0 2px 8px rgba(220, 38, 38, 0.3);
    animation: slideDown 0.3s ease;
}

@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.banner-icon {
    font-size: 1.2rem;
}

.banner-text {
    flex: 1;
}

/* 接管回复标记 */
.takeover-badge {
    display: inline-block;
    background: #fbbf24;
    color: #78350f;
    font-size: 0.65rem;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 8px;
    font-weight: 600;
    vertical-align: middle;
}

/* 接管消息样式 */
.takeover-message .assistant-bubble {
    border: 2px solid #f59e0b;
    box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
}

/* 页面头部 */
.chat-monitor-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--color-border);
}

.header-left h1 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 4px;
}

.header-left p {
    color: var(--color-text-secondary);
    font-size: .875rem;
}

.header-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
}

/* 连接状态 */
.connection-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .875rem;
}

.status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
}

.status-dot.connected {
    background: var(--color-success);
    box-shadow: 0 0 6px var(--color-success);
}

.status-dot.connecting {
    background: var(--color-warning);
    animation: pulse 1s infinite;
}

.status-dot.disconnected {
    background: var(--color-danger);
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* 接管模式开关 */
.takeover-toggle {
    display: flex;
    align-items: center;
    gap: 12px;
}

.toggle-label {
    font-size: .9rem;
    font-weight: 500;
    color: var(--color-text);
}

.toggle-switch {
    position: relative;
    display: inline-block;
    width: 56px;
    height: 28px;
}

.toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #ccc;
    transition: .3s;
    border-radius: 28px;
}

.toggle-slider:before {
    position: absolute;
    content: "";
    height: 22px;
    width: 22px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: .3s;
    border-radius: 50%;
    box-shadow: 0 2px 4px rgba(0,0,0,.2);
}

.toggle-switch input:checked + .toggle-slider {
    background-color: var(--color-primary);
}

.toggle-switch input:checked + .toggle-slider:before {
    transform: translateX(28px);
}

/* 消息滚动区域 */
.chat-messages {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    height: calc(100vh - 220px);
    min-height: 400px;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* 消息包装器 */
.message-wrapper {
    display: flex;
    width: 100%;
}

.message-wrapper.history {
    opacity: 0.7;
}

/* 用户消息 - 蓝色左对齐 */
.message-wrapper.user {
    justify-content: flex-start;
}

.user-bubble {
    background: #dbeafe;
    border: 1px solid #93c5fd;
    color: #1e40af;
    max-width: 80%;
}

/* 助手消息 - 灰色右对齐 */
.message-wrapper.assistant {
    justify-content: flex-end;
}

.assistant-bubble {
    background: #f1f5f9;
    border: 1px solid #cbd5e1;
    color: var(--color-text);
    max-width: 80%;
}

/* 工具调用 - 黄色卡片居中 */
.message-wrapper.tool-call {
    justify-content: center;
}

.tool-bubble {
    background: #fef3c7;
    border: 1px solid #fcd34d;
    color: #92400e;
    max-width: 90%;
}

/* 工具结果 */
.message-wrapper.tool-result {
    justify-content: center;
}

.tool-result-bubble {
    background: #f0fdf4;
    border: 1px solid #86efac;
    color: #166534;
    max-width: 90%;
    font-size: .85rem;
}

/* 错误消息 */
.message-wrapper.error {
    justify-content: center;
}

.error-bubble {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #991b1b;
    max-width: 90%;
}

/* 消息气泡 */
.message-bubble {
    border-radius: 12px;
    padding: 10px 14px;
    box-shadow: var(--shadow-sm);
}

.message-role {
    font-size: .7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 6px;
    opacity: 0.8;
}

.message-content {
    font-size: .9rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
}

/* 工具调用项 */
.tool-call-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 8px 0;
    border-bottom: 1px dashed #fcd34d;
}

.tool-call-item:last-child {
    border-bottom: none;
    padding-bottom: 0;
}

.tool-name {
    font-weight: 600;
    font-family: 'Monaco', 'Menlo', monospace;
    font-size: .85rem;
}

.tool-args {
    font-size: .8rem;
    color: #78350f;
    opacity: 0.9;
}

.tool-result-content {
    font-family: 'Monaco', 'Menlo', monospace;
    font-size: .8rem;
}

/* 接管输入框 */
.takeover-input {
    display: flex;
    gap: 8px;
    margin-top: 1rem;
    padding: 1rem;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
}

.takeover-input input {
    flex: 1;
}

/* 响应式 */
@media (max-width: 640px) {
    .chat-monitor-header {
        flex-direction: column;
        gap: 1rem;
    }

    .header-right {
        width: 100%;
        justify-content: space-between;
    }

    .chat-messages {
        height: calc(100vh - 280px);
    }
}
</style>
{% endblock %}
